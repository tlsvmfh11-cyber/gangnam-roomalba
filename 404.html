    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0A0A0F;
            color: #E0E0E0;
            display: flex;

            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(233,30,99,0.4); }
        .links { margin-top: 24px; }
        .links a {
            color: #F48FB1;
            text-decoration: none;
